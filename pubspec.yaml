name: flutter_crypto_wallet
description: Cross-platform cryptocurrency wallet with Flutter and Web3 integration
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  web3dart: ^2.7.3
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  local_auth: ^2.1.7
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
